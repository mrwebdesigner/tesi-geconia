<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geconia AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('fade-in-on-found', {
        init: function () {
          const el = this.el;
          this.el.parentElement.addEventListener("targetFound", () => {
            el.setAttribute('animation', {
              property: 'material.opacity',
              from: 0,
              to: 1,
              dur: 1000,
              easing: 'easeInQuad'
            });
          });
          this.el.parentElement.addEventListener("targetLost", () => {
            el.setAttribute('material', 'opacity', 0);
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden">
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <img id="overlayImage" src="./immagine-comparsa.jpg" />
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          src="#overlayImage"
          position="0 0 0.01"
          width="1"
          height="0.7382"
          material="transparent: true; opacity: 0"
          fade-in-on-found
        ></a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
